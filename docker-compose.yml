version: "3.9"

services:
  db:
    image: postgis/postgis:15-3.4   # PostgreSQL 15 with PostGIS pre-installed
    container_name: ngo_db
    environment:
      POSTGRES_DB: ngodb
      POSTGRES_USER: ngouser
      POSTGRES_PASSWORD: ngopass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ngouser -d ngodb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ngo_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ngo_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://ngouser:ngopass@db:5432/ngodb
      DATABASE_URL_SYNC: postgresql://ngouser:ngopass@db:5432/ngodb
      REDIS_URL: redis://redis:6379
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      APP_ENV: development
    volumes:
      - ./backend:/app    # hot reload — code changes reflect immediately
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data: